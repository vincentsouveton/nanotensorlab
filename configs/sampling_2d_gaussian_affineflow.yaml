# Data config
data:
  generator: gaussian
  params:
    dim: 2
    mean: 0.0
    std: 2.0
  sampling:
    n_samples: 10000
  split:
    train: 0.8
    val: 0.1
    test: 0.1
  seed: 42

# Model config
model:
  name: affine_flow
  params:
    dim: 2

# Training config
training:
  epochs: 100
  batch_size: 128
  lr: 0.001
